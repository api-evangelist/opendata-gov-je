apis:
  - aid: opendata-gov-je:catalog
    name: opendata.gov.je CKAN Action API
    description: >-
      CKAN Action API for opendata.gov.je, a consistent JSON-over-HTTP interface over a catalog of 118 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://opendata.gov.je/api/3/action/.
    humanURL: https://opendata.gov.je
    baseURL: https://opendata.gov.je/api/3/action
