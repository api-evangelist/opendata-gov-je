aid: opendata-gov-je
name: opendata.gov.je
description: >-
  opendata.gov.je is a open data portal open-data portal for JE running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 118 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
kind: government
